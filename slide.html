<!DOCTYPE html>
<html>
    <head>
        <style>
            #slidealani{
                display: block;
                margin: auto;
                position: relative;
                width: 800px;
                height: 300px;
            }
            #solalan{
                position: absolute;
                left: 0;
                top: 0;
                width: 100px;
                height: 300px;
            }
            #sagalan{
                position: absolute;
                right: 0;
                top: 0;
                width: 100px;
                height: 300px;
            }
            #arrowleft{
                position: absolute;
                top:150px;
                left: 20px;
                cursor: pointer;
            }
            #arrowright{
                position: absolute;
                top: 150px;
                right: 20px;
                cursor: pointer;
            }

        </style>
    </head>
    <body>
        <div id="slidealani">
            <img id="resim" src="slide1.jpg" width="800px" height="300px">
            <div id="solalan"><img id="arrowleft" src="arrowleft.png" onclick="resimdegistir(-1)"></div>
            <div id="sagalan"><img id="arrowright" src="arrowright.png" onclick="resimdegistir(1)"></div>
        </div>

        <script>
            var resimsirasi = 1;
            var toplamresim = 5;
            function resimdegistir(deger){
                var resim = document.getElementById("resim");
                resimsirasi = resimsirasi + deger;
                if(resimsirasi>toplamresim){
                    resimsirasi=1;
                }
                if(resimsirasi<1){
                    resimsirasi = toplamresim;
                }
                resim.src = "slide" + resimsirasi + ".jpg";
                clearInterval(zaman);
                zaman = window.setInterval(function calistir(){
                    var resim = document.getElementById("resim");
                    resimsirasi = resimsirasi + 1;
                    if(resimsirasi>toplamresim){
                        resimsirasi=1;
                }
                    if(resimsirasi<1){
                        resimsirasi = toplamresim;
                }
                resim.src = "slide" + resimsirasi + ".jpg";},3000);

            }

            var zaman = window.setInterval(function(calistir){
                var resim = document.getElementById("resim");
                resimsirasi = resimsirasi + 1;
                if(resimsirasi>toplamresim){
                        resimsirasi=1;
                }
                    if(resimsirasi<1){
                        resimsirasi = toplamresim;
                }
                resim.src = "slide" + resimsirasi + ".jpg";},3000);

        </script>
    </body>
</html>
